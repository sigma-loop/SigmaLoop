# Lambda LAP — Aider Configuration
# Full-stack educational platform (SigmaLoop)

# Convention hints for the AI
conventions: |
  This is a monorepo with Backend/ (Node.js Express TypeScript MongoDB) and Frontend/ (React TypeScript Vite Tailwind).
  Graduation Project/ is reference material only — never modify it.

  Backend conventions:
  - Express v5 MVC: models/ → controllers/ → routes/
  - Always use JSend response helpers from src/utils/jsend.ts
  - Auth: authenticate + authorize middleware from src/middlewares/auth.middleware.ts
  - Roles: STUDENT, INSTRUCTOR, ADMIN
  - Style: single quotes, no trailing commas, 100 char lines

  Frontend conventions:
  - React 19 + Vite, auth via useAuth() from contexts/AuthContext.tsx
  - API calls via Axios instance in services/api.ts (auto JWT)
  - UI primitives in components/ui/, pages in pages/<Name>/<Name>.tsx
  - Style: double quotes, trailing commas es5, 80 char lines
  - Tailwind CSS with glass morphism utilities

# Lint command
lint-cmd:
  - "cd Backend && npx eslint --fix"
  - "cd Frontend && npx eslint --fix"

# Test command
test-cmd: "cd Backend && npm test"

# Auto-commit settings
auto-commits: true
dirty-commits: false

# File patterns to watch
watch-files:
  - "Backend/src/**/*.ts"
  - "Frontend/src/**/*.tsx"
  - "Frontend/src/**/*.ts"
