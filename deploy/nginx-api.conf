# SigmaLoop API reverse proxy.
#   sudo cp nginx-api.conf /etc/nginx/sites-available/sigmaloop-api
#   sudo ln -s /etc/nginx/sites-available/sigmaloop-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.sigmaloop.dpdns.org
# certbot rewrites this file to add the TLS (443) block + HTTP→HTTPS redirect.

server {
    listen 80;
    server_name api.sigmaloop.dpdns.org;

    # Code submissions / long generation responses.
    client_max_body_size 5m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
